<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>我的筆記本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f4ef;
  --surface: #ffffff;
  --ink: #1c1917;
  --ink2: #57534e;
  --ink3: #a8a29e;
  --accent: #c2410c;
  --accent-light: #fff7ed;
  --border: #e7e3dc;
  --radius: 12px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  padding-bottom: 2rem;
}
.top-bar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
}
.top-bar-icon {
  width: 34px; height: 34px;
  background: var(--accent);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.top-bar-icon svg { width: 18px; height: 18px; fill: white; }
.top-bar h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: 0.02em;
}
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 1rem;
}
.tab {
  flex: 1;
  padding: 12px 0;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink3);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.02em;
}
.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
  font-weight: 500;
}
.content { padding: 1.25rem; max-width: 540px; margin: 0 auto; }

/* form */
.field { margin-bottom: 1rem; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 500;
  color: var(--ink3);
  margin-bottom: 5px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.field input[type=text],
.field input[type=url],
.field textarea {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 15px;
  font-family: 'Noto Sans TC', sans-serif;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field input:focus, .field textarea:focus { border-color: var(--accent); }
.field textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
::placeholder { color: var(--ink3); }

.type-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
}
.type-btn {
  padding: 9px 4px;
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--ink2);
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  line-height: 1.4;
}
.type-btn.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-chip {
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  padding: 4px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--ink2);
  cursor: pointer;
  transition: all 0.15s;
}
.tag-chip.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}

.img-area {
  border: 1.5px dashed var(--border);
  border-radius: 8px;
  padding: 1.5rem;
  text-align: center;
  cursor: pointer;
  background: var(--surface);
  transition: border-color 0.2s;
}
.img-area:hover { border-color: var(--accent); }
.img-area p { font-size: 13px; color: var(--ink3); }
.img-area small { font-size: 11px; color: var(--ink3); display: block; margin-top: 3px; }
#img-preview { max-width: 100%; border-radius: 6px; margin-top: 10px; display: none; }

.btn-save {
  width: 100%;
  padding: 14px;
  background: var(--accent);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-family: 'Noto Sans TC', sans-serif;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: opacity 0.2s, transform 0.1s;
  margin-top: 0.5rem;
}
.btn-save:active { transform: scale(0.98); opacity: 0.9; }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

.status-box {
  margin-top: 12px;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
}
.status-box.loading { background: #fef3c7; color: #92400e; display: block; }
.status-box.ok { background: #d1fae5; color: #065f46; display: block; }
.status-box.err { background: #fee2e2; color: #991b1b; display: block; }

/* history */
.note-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow);
}
.nc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.nc-type {
  font-size: 11px;
  padding: 2px 9px;
  border-radius: 20px;
  background: var(--accent-light);
  color: var(--accent);
  font-weight: 500;
}
.nc-date { font-size: 11px; color: var(--ink3); }
.nc-title { font-size: 15px; font-weight: 500; color: var(--ink); margin-bottom: 4px; font-family: 'Noto Serif TC', serif; }
.nc-summary { font-size: 13px; color: var(--ink2); line-height: 1.5; }
.nc-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.nc-tag { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: var(--bg); color: var(--ink3); border: 1px solid var(--border); }
.nc-url { margin-top: 6px; font-size: 12px; }
.nc-url a { color: var(--accent); word-break: break-all; }

.empty { text-align: center; padding: 3rem 0; color: var(--ink3); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }
.empty p { font-size: 14px; }

.divider { height: 1px; background: var(--border); margin: 1rem 0; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-icon">
    <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 2l5 5h-5V4zM6 20V4h5v7h7v9H6z"/></svg>
  </div>
  <h1>我的筆記本</h1>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('add')">＋ 新增筆記</button>
  <button class="tab" onclick="switchTab('history')">📋 已儲存</button>
</div>

<div class="content">

  <!-- 新增筆記 -->
  <div id="tab-add">
    <div class="field" style="margin-top:0.5rem">
      <label>類型</label>
      <div class="type-grid">
        <button class="type-btn active" onclick="selectType(this,'讀書心得')">📖<br>讀書心得</button>
        <button class="type-btn" onclick="selectType(this,'網址書籤')">🔗<br>網址書籤</button>
        <button class="type-btn" onclick="selectType(this,'圖片筆記')">🖼️<br>圖片筆記</button>
        <button class="type-btn" onclick="selectType(this,'想法靈感')">💡<br>想法靈感</button>
        <button class="type-btn" onclick="selectType(this,'待辦記錄')">✅<br>待辦記錄</button>
        <button class="type-btn" onclick="selectType(this,'其他')">📝<br>其他</button>
      </div>
    </div>

    <div class="field">
      <label>標題（選填，留空由 AI 自動命名）</label>
      <input type="text" id="inp-title" placeholder="輸入標題...">
    </div>

    <div class="field">
      <label>內容</label>
      <textarea id="inp-content" placeholder="輸入你的筆記、心得、想法..."></textarea>
    </div>

    <div class="field" id="url-field">
      <label>網址（選填）</label>
      <input type="url" id="inp-url" placeholder="https://...">
    </div>

    <div class="field" id="img-field" style="display:none">
      <label>圖片</label>
      <div class="img-area" onclick="document.getElementById('img-input').click()">
        <p>點擊選取圖片</p>
        <small>JPG / PNG / HEIC</small>
        <img id="img-preview" />
      </div>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="handleImg(this)">
    </div>

    <div class="field">
      <label>標籤（可多選）</label>
      <div class="tag-row">
        <span class="tag-chip" onclick="toggleTag(this)">閱讀</span>
        <span class="tag-chip" onclick="toggleTag(this)">工作</span>
        <span class="tag-chip" onclick="toggleTag(this)">生活</span>
        <span class="tag-chip" onclick="toggleTag(this)">投資</span>
        <span class="tag-chip" onclick="toggleTag(this)">學習</span>
        <span class="tag-chip" onclick="toggleTag(this)">旅遊</span>
        <span class="tag-chip" onclick="toggleTag(this)">食物</span>
        <span class="tag-chip" onclick="toggleTag(this)">健康</span>
      </div>
    </div>

    <button class="btn-save" id="btn-save" onclick="saveNote()">儲存到 Notion</button>
    <div class="status-box" id="status"></div>
  </div>

  <!-- 已儲存 -->
  <div id="tab-history" style="display:none">
    <div id="history-list"></div>
  </div>

</div>

<script>
const REPO_OWNER = 'alicecheng-hub';
const REPO_NAME = 'my-notebook';
const GITHUB_TOKEN_KEY = 'nb_gh_token';

let selectedType = '讀書心得';
let selectedTags = [];
let imgBase64 = null;
let history = JSON.parse(localStorage.getItem('nb_history') || '[]');

// GitHub PAT 設定
let ghToken = localStorage.getItem(GITHUB_TOKEN_KEY) || '';
if (!ghToken) {
  ghToken = prompt('請輸入你的 GitHub Personal Access Token（只需第一次）：') || '';
  if (ghToken) localStorage.setItem(GITHUB_TOKEN_KEY, ghToken);
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', (t==='add'&&i===0)||(t==='history'&&i===1)));
  document.getElementById('tab-add').style.display = t==='add' ? '' : 'none';
  document.getElementById('tab-history').style.display = t==='history' ? '' : 'none';
  if (t === 'history') renderHistory();
}

function selectType(el, type) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  selectedType = type;
  document.getElementById('img-field').style.display = type === '圖片筆記' ? '' : 'none';
}

function toggleTag(el) {
  el.classList.toggle('active');
  const t = el.textContent;
  selectedTags = selectedTags.includes(t) ? selectedTags.filter(x => x !== t) : [...selectedTags, t];
}

function handleImg(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    imgBase64 = e.target.result;
    const prev = document.getElementById('img-preview');
    prev.src = imgBase64;
    prev.style.display = 'block';
    document.querySelector('.img-area p').textContent = '已選取圖片';
  };
  reader.readAsDataURL(file);
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-box ' + type;
}

async function saveNote() {
  const content = document.getElementById('inp-content').value.trim();
  const url = document.getElementById('inp-url').value.trim();
  const titleInput = document.getElementById('inp-title').value.trim();

  if (!content && !url) { setStatus('請輸入內容或網址', 'err'); return; }
  if (!ghToken) { setStatus('請先設定 GitHub Token', 'err'); return; }

  const btn = document.getElementById('btn-save');
  btn.disabled = true;
  setStatus('準備儲存中...', 'loading');

  const payload = {
    type: selectedType,
    title: titleInput,
    content: content,
    url: url,
    tags: selectedTags,
    has_image: !!imgBase64,
    image_base64: imgBase64 || '',
    timestamp: new Date().toISOString()
  };

  try {
    const res = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + ghToken,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        event_type: 'save_note',
        client_payload: payload
      })
    });

    if (res.status === 204) {
      const record = {
        title: titleInput || selectedType,
        type: selectedType,
        content: content.slice(0, 80),
        url, tags: selectedTags,
        date: new Date().toLocaleDateString('zh-TW')
      };
      history.unshift(record);
      localStorage.setItem('nb_history', JSON.stringify(history.slice(0, 50)));

      setStatus('✓ 已送出！Notion 將在幾秒內更新', 'ok');
      document.getElementById('inp-content').value = '';
      document.getElementById('inp-url').value = '';
      document.getElementById('inp-title').value = '';
      document.querySelectorAll('.tag-chip').forEach(c => c.classList.remove('active'));
      selectedTags = [];
      imgBase64 = null;
      document.getElementById('img-preview').style.display = 'none';
    } else {
      const err = await res.json();
      throw new Error(err.message || 'HTTP ' + res.status);
    }
  } catch(e) {
    setStatus('失敗：' + e.message, 'err');
  }

  btn.disabled = false;
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (!history.length) {
    el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>尚無儲存記錄</p></div>';
    return;
  }
  el.innerHTML = history.map(n => `
    <div class="note-card">
      <div class="nc-top">
        <span class="nc-type">${n.type}</span>
        <span class="nc-date">${n.date}</span>
      </div>
      <div class="nc-title">${n.title || '未命名'}</div>
      ${n.content ? `<div class="nc-summary">${n.content}${n.content.length >= 80 ? '...' : ''}</div>` : ''}
      ${n.url ? `<div class="nc-url"><a href="${n.url}" target="_blank">${n.url.slice(0,60)}${n.url.length>60?'...':''}</a></div>` : ''}
      ${n.tags?.length ? `<div class="nc-tags">${n.tags.map(t => `<span class="nc-tag">${t}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}
</script>
</body>
</html>
